# =============================================================================
# 3. SERVICES
# =============================================================================

services:
  - id: laser_cleaning
    name: Лазерная очистка
    short_description: >-
      Удаление ржавчины, старой краски, окислов и загрязнений с металла
      лазерным лучом без абразива. Сохраняет заводское ЛКП рядом
      с обрабатываемой зоной.
    unit: 1 м²
    public: true

  - id: disassembly
    name: Арматурные работы
    short_description: >-
      Снятие и установка элементов (бамперы, подкрылки, защиты, накладки)
      для доступа к скрытым зонам кузова.
    unit: снятие+установка
    public: true

  - id: anticor_complex
    name: Антикоррозийный комплекс
    short_description: >-
      Комплексная обработка кузова: очистка, грунтовка, нанесение
      антикоррозийных материалов, консервация скрытых полостей.
    unit: комплекс
    public: true

  - id: cavity_conservation
    name: Консервация скрытых полостей
    short_description: >-
      Обработка внутренних полостей кузова (пороги, стойки, лонжероны)
      восковыми антикорами для защиты от внутренней коррозии.
    unit: комплекс
    public: true

  - id: paint_protection
    name: Защита ЛКП
    short_description: >-
      Нанесение защитных покрытий на лакокрасочное покрытие после
      подготовки поверхности.
    unit: комплекс
    public: false

# =============================================================================
# 4. GUARANTEES
# =============================================================================

# Важно: юридически значимые условия. verified: true только если текст согласован.

guarantees:
  - type: workmanship
    title: Гарантия на выполненные работы
    duration: до 5 лет
    description: >-
      Мы предоставляем гарантию на антикоррозионную обработку при соблюдении
      условий эксплуатации автомобиля. В гарантию входит: качество нанесения
      антикоррозионных материалов, соблюдение технологии обработки,
      использование профессиональных материалов, выполнение работ в соответствии
      с выбранным комплексом. Срок гарантии — до 5 лет в зависимости от выбранного
      комплекса обработки и применяемых материалов.
    verified: true

  - type: exclusions
    title: Что не входит в гарантию
    duration: null
    description: >-
      Гарантия не распространяется на: уже существующую сквозную коррозию;
      механические повреждения кузова после обработки; последствия ДТП;
      повреждения вследствие ремонта третьими лицами; естественный износ деталей,
      не связанных с выполненной обработкой. При необходимости мы рекомендуем
      периодический контроль состояния защитного покрытия.
    verified: true

  - type: materials
    title: Гарантия на материалы
    duration: по гарантии производителя
    description: >-
      Гарантия на материалы предоставляется производителем
      (Dinitrol, ONB Master, MasterWAX) и действует согласно
      его условиям.
    verified: true

  - type: quality_promise
    title: Гарантия качества
    duration: null
    description: >-
      Мы уверены в качестве выполняемых работ и используемых материалов, поэтому
      предоставляем гарантию на антикоррозионную обработку автомобиля. Срок
      гарантии зависит от выбранного комплекса работ, применяемых материалов и
      состояния кузова на момент обработки. Каждый автомобиль предварительно
      осматривается, после чего мы объясняем, какие работы будут выполнены,
      какой результат можно ожидать и на какой срок распространяется гарантия.
      Наша задача — не просто обработать автомобиль, а обеспечить его
      долговременную защиту при соблюдении рекомендаций по эксплуатации.
    verified: true

