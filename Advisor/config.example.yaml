# Пример конфигурации Advisor.
# Скопируйте в config.yaml в корне проекта или укажите путь при инициализации.
# OPENAI_API_KEY берётся ТОЛЬКО из переменной окружения.

advisor:
  # По умолчанию выключено. Owner должен явно включить.
  enabled: false

  # Модель OpenAI для консультаций.
  # Рекомендуется экономичная модель с хорошим следованием инструкциям.
  model: "gpt-4.1-nano"

  # Максимальный размер санитизированного контекста в символах.
  max_context_chars: 8000

  # Максимальный размер ответа модели.
  max_output_tokens: 2048

  # Дневной лимит запросов к Advisor.
  daily_request_limit: 50

  # Таймаут запроса к OpenAI API (секунды).
  timeout: 30

  # Путь к директории с промптами (опционально).
  # prompts_dir: "/path/to/Advisor/prompts"
